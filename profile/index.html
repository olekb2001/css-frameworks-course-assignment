<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <link href="../dist/styles.css" rel="stylesheet" />
</head>
<body class="bg-gray-50">
  <div class="max-w-4xl mx-auto p-4">
    <section class="bg-white p-6 rounded shadow mb-6">
      <div class="flex items-center space-x-4">
        <img src="https://via.placeholder.com/80" alt="Profile Image" class="w-20 h-20 rounded-full" />
        <div>
          <h1 class="text-2xl font-bold">Username</h1>
          <button class="bg-blue-600 text-white px-4 py-1 rounded hover:bg-blue-700">Follow</button>
        </div>
      </div>
    </section>

    <section class="bg-white p-4 rounded shadow">
      <h2 class="text-xl font-semibold mb-4">User Posts</h2>
      <ul class="space-y-2">
        <li class="border-b pb-2">Post 1</li>
        <li class="border-b pb-2">Post 2</li>
        <li class="border-b pb-2">Post 3</li>
