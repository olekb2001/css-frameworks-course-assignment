<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <link href="../dist/styles.css" rel="stylesheet" />
</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <nav class="bg-white shadow-md px-6 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-blue-600">MySocial</h1>
    <ul class="flex space-x-6 text-gray-700 font-medium">
      <li><a href="../index.html" class="hover:underline">Login</a></li>
      <li><a href="../feed/index.html" class="hover:underline">Feed</a></li>
      <li><a href="../profile/index.html" class="hover:underline">Profile</a></li>
    </ul>
  </nav>

  <!-- Profile Container -->
  <div class="max-w-4xl mx-auto p-4 space-y-6">

    <!-- Profile Header -->
    <section class="bg-white p-6 rounded shadow flex items-center gap-6">
      <img src="https://i.pravatar.cc/150?img=3" alt="Profile Image" class="w-24 h-24 rounded-full object-cover" />
      <div class="pl-4">
        <h1 class="text-2xl font-bold mb-2">John Doe</h1>
        <button class="bg-blue-600 text-white px-4 py-1 rounded hover:bg-blue-700 transition mb-3">Follow</button>
        <div class="flex space-x-6 text-gray-600">
          <span><strong>120</strong> Followers</span>
          <span><strong>80</strong> Following</span>
        </div>
      </div>
    </section>

    <!-- User Posts -->
    <section class="bg-white p-6 rounded shadow">
      <h2 class="text-xl font-semibold mb-4">User Posts</h2>
      <ul class="space-y-6">

        <li class="border-b pb-4">
          <img src="https://picsum.photos/seed/mountains/600/300" alt="Mountains" class="w-full rounded mb-2 object-cover" />
          <h3 class="font-semibold text-lg">Exploring the Mountains</h3>
          <p class="text-gray-600">Just came back from an amazing hiking trip!</p>
        </li>

        <li class="border-b pb-4">
          <img src="https://picsum.photos/seed/coffee/600/300" alt="Coffee" class="w-full rounded mb-2 object-cover" />
          <h3 class="font-semibold text-lg">Coffee Vibes</h3>
          <p class="text-gray-600">Starting the day with a good cup ☕</p>
        </li>

        <li>
          <img src="https://picsum.photos/seed/sunset/600/300" alt="Sunset" class="w-full rounded mb-2 object-cover" />
          <h3 class="font-semibold text-lg">Sunset Shots</h3>
          <p class="text-gray-600">Captured this beautiful sunset last evening.</p>
        </li>

      </ul>
    </section>

  </div>

</body>
</html>
