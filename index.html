<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Register</title>
  <link href="./dist/styles.css" rel="stylesheet" />
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-100">
  <form action="/profile" method="POST" class="bg-white p-6 rounded-lg shadow-md w-full max-w-sm space-y-4">
    <h2 class="text-xl font-semibold text-center">Login / Register</h2>

    <input type="email" name="email" required placeholder="Email" class="w-full border p-2 rounded" />
    <input type="password" name="password" required minlength="8" placeholder="Password" class="w-full border p-2 rounded" />

    <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition">
      Submit
    </button>
  </form>
</body>
</html>
