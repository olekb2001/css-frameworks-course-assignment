<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed</title>
  <link href="../dist/styles.css" rel="stylesheet" />
</head>
<body class="bg-gray-100 text-gray-800">

  <!-- Navbar -->
  <nav class="bg-white shadow p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">MySocial</h1>
    <ul class="flex gap-4">
      <li><a href="../index.html" class="hover:underline">Home</a></li>
      <li><a href="../profile/index.html" class="hover:underline">Profile</a></li>
    </ul>
  </nav>

  <!-- Main Feed Area -->
  <main class="max-w-4xl mx-auto p-4">
    
    <!-- Search & Sort -->
    <div class="flex flex-col sm:flex-row justify-between items-center mb-4 gap-2">
      <input type="text" placeholder="Search posts..." class="border p-2 rounded w-full sm:w-1/2" />
      <select class="border p-2 rounded w-full sm:w-1/4">
        <option value="newest">Sort by: Newest</option>
        <option value="popular">Most Popular</option>
      </select>
    </div>

    <!-- New Post Form -->
    <form class="bg-white p-4 rounded shadow mb-6 space-y-4">
      <h2 class="text-lg font-semibold">Create a Post</h2>
      <input type="text" placeholder="Post title" class="border p-2 rounded w-full" required />
      <textarea placeholder="What's on your mind?" class="border p-2 rounded w-full" required></textarea>
      <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Post</button>
    </form>

    <!-- Post List -->
    <section class="space-y-4">
      <!-- Single post card -->
      <article class="bg-white p-4 rounded shadow flex items-start gap-4">
        <img src="https://via.placeholder.com/80" alt="Post thumbnail" class="w-20 h-20 object-cover rounded" />
        <div>
          <h3 class="font-bold text-lg">Sample Post Title</h3>
          <p class="text-sm text-gray-600">This is a sample post description.</p>
        </div>
      </article>

      <!-- More post cards can be copied below -->
    </section>

  </main>
</body>
</html>
