<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed</title>
  <link href="../dist/styles.css" rel="stylesheet" />
</head>
<body class="bg-gray-100 text-gray-800 flex">

  <!-- Left colored sidebar strip -->
  <div class="w-2 bg-blue-600 min-h-screen"></div>

  <div class="flex-1">
    <!-- Navbar -->
    <!-- Navbar -->
    <nav class="bg-white shadow-md px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-blue-600">Ole Social App</h1>
        <ul class="flex space-x-6 text-gray-700 font-medium">
            <li><a href="../index.html" class="hover:underline">Login</a></li>
            <li><a href="../feed/index.html" class="hover:underline">Feed</a></li>
            <li><a href="../profile/index.html" class="hover:underline">Profile</a></li>
        </ul>
    </nav>
    <!-- Main Content -->
    <main class="max-w-4xl mx-auto p-6 space-y-8">

      <!-- Search and Sort -->
      <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
        <input type="text" placeholder="Search posts..." class="border p-2 rounded w-full sm:w-1/2" />
        <select class="border p-2 rounded w-full sm:w-1/4">
          <option value="newest">Sort by: Newest</option>
          <option value="popular">Most Popular</option>
        </select>
      </div>

      <!-- Post Form -->
      <form class="bg-white p-6 rounded shadow space-y-4">
        <h2 class="text-xl font-semibold">Create a Post</h2>
        <input type="text" placeholder="Post title" class="border p-2 rounded w-full" required />
        <textarea placeholder="What's on your mind?" class="border p-2 rounded w-full" required></textarea>
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Post</button>
      </form>
      <!-- Post List -->
        <section class="space-y-6">
            <!-- Post 1 -->
            <article class="bg-white p-4 rounded shadow space-y-2">
                <img src="https://picsum.photos/600/300?random=1" alt="Post thumbnail" class="w-full rounded object-cover" />
                <h3 class="text-xl font-semibold">Exploring the Mountains</h3>
                <p class="text-gray-700">Just went hiking in the Rockies. The views were incredible!</p>
            </article>

            <!-- Post 2 -->
            <article class="bg-white p-4 rounded shadow space-y-2">
                <img src="https://picsum.photos/600/300?random=2" alt="Post thumbnail" class="w-full rounded object-cover" />
                <h3 class="text-xl font-semibold">New Café in Town</h3>
                <p class="text-gray-700">Tried the espresso at the new café — 10/10 would recommend.</p>
            </article>

            <!-- Post 3 -->
            <article class="bg-white p-4 rounded shadow space-y-2">
                <img src="https://picsum.photos/600/300?random=3" alt="Post thumbnail" class="w-full rounded object-cover" />
                <h3 class="text-xl font-semibold">Throwback Thursday</h3>
                <p class="text-gray-700">Remembering this amazing beach day with friends.</p>
            </article>
        </section>
    </main>
  </div>
</body>
</html>
