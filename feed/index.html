<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed</title>
  <link href="../dist/styles.css" rel="stylesheet" />
</head>
<body class="bg-gray-50 text-gray-800">
  <div class="container mx-auto p-4">
    <header class="mb-6 flex justify-between items-center">
      <h1 class="text-2xl font-bold">Feed</h1>
      <input type="text" placeholder="Search..." class="border p-2 rounded w-1/3" />
    </header>

    <section class="space-y-4">
      <!-- Example Post -->
      <article class="bg-white p-4 rounded shadow">
        <h2 class="font-semibold">Post Title</h2>
        <p>This is an example post with some content.</p>
      </article>
    </section>

    <form class="mt-6 bg-white p-4 rounded shadow space-y-2">
      <input type="text" placeholder="New Post Title" class="w-full border p-2 rounded" />
      <textarea placeholder="Post content..." class="w-full border p-2 rounded"></textarea>
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
        Create Post
      </button>
    </form>
  </div>
</body>
</html>
